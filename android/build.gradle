buildscript {
  ext.safeExtGet = { prop, fallback ->
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.2.2"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${safeExtGet('kotlinVersion', '2.0.21')}"
  }
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

android {
  namespace "cat.bcn.osam.reactnative"
  compileSdkVersion safeExtGet("compileSdkVersion", 35)
  buildToolsVersion safeExtGet("buildToolsVersion", "35.0.0")

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 26)
    targetSdkVersion safeExtGet("targetSdkVersion", 35)
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }

  sourceSets {
    main {
      java.srcDirs = ["src/main/java"]
    }
  }
}

repositories {
  google()
  mavenCentral()
  maven {
    url "https://jitpack.io"
    credentials {
      username = project.findProperty("jitpack.username") ?: ""
      password = project.findProperty("jitpack.token") ?: ""
    }
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0"

  // OSAM common module (Barcelona City Council) — `api` so consumers writing
  // custom `OSAMWrappersFactory` implementations can import `cat.bcn.commonmodule.*`.
  api "com.github.AjuntamentdeBarcelona.modul_comu_osam:common-android:${safeExtGet('osamCommonVersion', '3.2.0')}"

  // Firebase default wrappers — compileOnly so consumer app's Firebase versions are used at runtime.
  // Consumer must either provide these Firebase deps in their app, OR override the wrapper factory.
  compileOnly "com.google.firebase:firebase-analytics:22.1.2"
  compileOnly "com.google.firebase:firebase-crashlytics:19.2.1"
  compileOnly "com.google.firebase:firebase-perf:21.0.2"
  compileOnly "com.google.firebase:firebase-messaging:24.0.3"
}
